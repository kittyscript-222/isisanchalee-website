  <title>Your Downloads — Isis Anchalee</title>

  <style>
    :root {
      --deep: #0E0B08;
      --cream: #F5F0E8;
      --gold: #B8975A;
      --gold-light: #D4AF71;
      --muted: rgba(245,240,232,0.55);
      --border: rgba(184,151,90,0.2);
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Lato', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--deep);
      color: var(--cream);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .container { max-width: 560px; width: 100%; text-align: center; }
    .symbol { font-size: 2.5rem; color: var(--gold); margin-bottom: 1.5rem; }
    h1 { font-family: var(--serif); font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 300; margin-bottom: 0.75rem; }
    h1 em { font-style: italic; color: var(--gold-light); }
    .subtitle { font-size: 1rem; color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }
    .email-notice {
      display: flex; align-items: flex-start; gap: 0.8rem;
      background: rgba(184,151,90,0.06); border: 0.5px solid var(--border);
      padding: 1rem 1.2rem; margin-bottom: 1.5rem;
      font-size: 0.88rem; color: var(--muted); line-height: 1.65; text-align: left;
    }
    .email-notice::before { content: '✉'; color: var(--gold); font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 1rem; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 1.5px solid rgba(184,151,90,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .files { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem; }
    .file-card { border: 0.5px solid var(--border); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; background: rgba(184,151,90,0.04); }
    .file-name { font-size: 0.9rem; color: var(--cream); text-align: left; line-height: 1.4; }
    .btn-download { flex-shrink: 0; background: var(--gold); color: var(--deep); font-family: var(--sans); font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 400; padding: 0.6rem 1.2rem; text-decoration: none; white-space: nowrap; transition: background 0.2s; }
    .btn-download:hover { background: var(--gold-light); }
    .divider { width: 40px; height: 0.5px; background: rgba(184,151,90,0.3); margin: 2rem auto; }
    .back-link { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); text-decoration: none; }
    .back-link:hover { color: var(--gold-light); }
    .error-msg { color: #e07070; font-size: 0.95rem; line-height: 1.6; }
    @media (max-width: 480px) {
      .file-card { flex-direction: column; align-items: flex-start; }
      .btn-download { width: 100%; text-align: center; }
    }
  
  /* ============================================================
     MOBILE PATCH — auto-appended, covers all pages
     ============================================================ */

    .section, .shop-section { padding-left: 1.8rem !important; padding-right: 1.8rem !important; }
    footer { padding-left: 1.8rem !important; padding-right: 1.8rem !important; flex-direction: column; gap: 1.5rem; text-align: center; }
    .hero-left, .page-hero-left { padding: 7rem 1.8rem 3rem !important; }
    .hero-title { font-size: clamp(2.4rem, 7vw, 3.8rem) !important; }
    .page-hero { padding: 7rem 1.8rem 4rem !important; }
    .about-hero { padding: 8rem 1.8rem 4rem !important; }
    .bio-inner, .speaking-photo-strip { grid-template-columns: 1fr !important; }
    .phil-grid { grid-template-columns: 1fr 1fr !important; }
    .phil-item { border-right: none !important; border-bottom: 0.5px solid rgba(184,151,90,0.12) !important; }
    .process-steps, .facts-grid { grid-template-columns: 1fr 1fr !important; }
    .audio-grid { grid-template-columns: 1fr 1fr !important; }
    .shop-section { padding: 2.5rem 1.8rem !important; }
    .section { padding: 5rem 1.8rem !important; }
    .pricing-cards, .investment-cards { flex-direction: column !important; }
    .inv-card, .price-card { width: 100% !important; }
    .page-hero-left::before { font-size: 5rem !important; }
    .shiva-feature::before { font-size: 8rem !important; }
    .start-paths { grid-template-columns: 1fr !important; }
    .mission-section { padding: 4rem 1.8rem !important; }
  }
  @media (max-width: 480px) {
    * { box-sizing: border-box; }
    h1, .hero-title, .confirm-title { font-size: clamp(2rem, 9vw, 2.8rem) !important; }
    h2, .section-title, .form-intro-title { font-size: clamp(1.5rem, 7vw, 2rem) !important; }
    h3 { font-size: clamp(1.1rem, 5vw, 1.4rem) !important; }
    p, li, .q-desc, .audio-desc, .consent-text { font-size: 0.92rem !important; line-height: 1.75 !important; }
    .page-hero-left::before, .shiva-feature::before, .section-bg-num { display: none !important; }
    .section, .shop-section, .mission-section, .start-here,
    .cta-strip, .page-hero, .about-hero,
    .inner-testimonials { padding: 3.5rem 1rem !important; }
    .hero-left { padding: 5.5rem 1rem 2.5rem !important; }
    .hero-subtitle { font-size: 0.92rem !important; line-height: 1.8 !important; }
    footer { padding: 2rem 1rem !important; flex-direction: column; gap: 1.5rem; text-align: center; }
    .footer-links { flex-wrap: wrap; justify-content: center; gap: 1rem !important; }
    .audio-grid, .sessions-grid, .shop-grid,
    .process-steps, .facts-grid, .phil-grid,
    .bio-inner, .speaking-photo-strip,
    .investment-cards, .pricing-cards,
    .start-paths, .inner-testi-grid { grid-template-columns: 1fr !important; }
    .phil-item { border-right: none !important; border-bottom: 0.5px solid rgba(184,151,90,0.12) !important; }
    .inv-card, .price-card, .audio-item,
    .session-card, .offering-card { width: 100% !important; padding: 1.5rem 1rem !important; }
    .btn-gold, .btn-outline, .btn-primary, .btn-submit,
    .btn-outline-dark { width: 100% !important; text-align: center !important; display: block !important; box-sizing: border-box !important; }
    .cta-actions, .hero-actions { flex-direction: column !important; gap: 0.8rem !important; }
    .consent-box { max-height: 300px !important; padding: 1.2rem !important; }
    .q-input, .q-textarea { font-size: 16px !important; }
    .yn-row { flex-direction: column !important; gap: 0.5rem !important; }
    .yn-btn { width: 100% !important; text-align: center !important; }
    .audio-bar { flex-direction: column !important; align-items: stretch !important; gap: 0.8rem !important; padding: 1rem !important; }
    .btn-add-cart { width: 100% !important; }
    .cart-sidebar { width: 100vw !important; }
    .speaking-photo-img { min-height: 65vw !important; }
    .investment-grid { grid-template-columns: 1fr !important; }
    .file-card { flex-direction: column !important; align-items: flex-start !important; gap: 0.8rem !important; }
    .btn-download { width: 100% !important; text-align: center !important; }
    .confirm-steps { flex-wrap: wrap !important; gap: 0.5rem !important; }
    .step-line { display: none !important; }
    .email-capture-modal { padding: 2rem 1rem !important; }
    .step-item { flex-direction: column !important; }
    span[style*="font-size: 7rem"], span[style*="font-size:7rem"] { font-size: 3rem !important; }
  }

<body>
  <div class="container">
    <div class="symbol">✦</div>
    <h1>Your purchase is <em>confirmed</em></h1>
    <p class="subtitle">Thank you. Your audios have been sent to your email with full instructions — but if you don't want to wait you can also download them directly below 🫶🏼</p>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span>Preparing your files...</span>
      </div>
    </div>

    <div class="divider"></div>
    <a href="shop.html" class="back-link">← Return to shop</a>
  </div>

  <script>
    async function loadDownloads() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const content = document.getElementById("content");

      if (!sessionId) {
        content.innerHTML = `<p class="error-msg">No session found. If you completed a purchase, please check your email or contact us at <a href="mailto:hello@isisanchalee.com" style="color:var(--gold)">hello@isisanchalee.com</a></p>`;
        return;
      }

      try {
        const res = await fetch(`/api/downloads?session_id=${sessionId}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong");

        const isCustomAudio = data.productName === 'Custom Hypnosis Audio' || (!data.files || data.files.length === 0);

        if (isCustomAudio) {
          content.innerHTML = `
            <div class="email-notice">Your order has been received. Please complete the brief on the next screen so I can begin crafting your personalised audio — delivery within 3 working days.</div>
          `;
        } else {
          const filesHtml = data.files.map(f => `
            <div class="file-card">
              <span class="file-name">${f.name}</span>
              <a class="btn-download" href="${f.url}" download target="_blank">Download</a>
            </div>
          `).join("");

          content.innerHTML = `
            <div class="email-notice">Check your spam or promotions tab if the email doesn't arrive within a few minutes.</div>
            <div class="files">${filesHtml}</div>
          `;
        }

        // Fire GA4 purchase event once per transaction (deduped via sessionStorage)
        if (data.transaction && typeof gtag === "function") {
          const trackedKey = "ga4_purchase_tracked_" + data.transaction.id;
          if (!sessionStorage.getItem(trackedKey)) {
            gtag("event", "purchase", {
              transaction_id: data.transaction.id,
              value: data.transaction.value,
              currency: data.transaction.currency,
              items: data.transaction.items,
            });
            sessionStorage.setItem(trackedKey, "1");
          }
        }
      } catch (err) {
        content.innerHTML = `
          <p class="error-msg">
            Something went wrong retrieving your files. Please email
            <a href="mailto:hello@isisanchalee.com" style="color:var(--gold)">hello@isisanchalee.com</a>
            with your order confirmation and we'll send them to you directly.
          </p>
        `;
        console.error(err);
      }
    }

    loadDownloads();
  </script>
</body>
